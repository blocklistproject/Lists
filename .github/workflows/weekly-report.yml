name: Weekly Issue Report

on:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly statistics
        id: stats
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Calculate date range (last 7 days)
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            // Fetch issues from the last week
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'all',
              since: weekAgo.toISOString(),
              per_page: 100
            });
            
            // Filter out PRs
            const issues = allIssues.filter(issue => !issue.pull_request);
            
            // Calculate statistics
            const stats = {
              total_issues: issues.length,
              opened: issues.filter(i => new Date(i.created_at) >= weekAgo).length,
              closed: issues.filter(i => i.state === 'closed' && new Date(i.closed_at) >= weekAgo).length,
              add_requests: issues.filter(i => i.labels.some(l => l.name === 'request:add')).length,
              remove_requests: issues.filter(i => i.labels.some(l => l.name === 'request:remove')).length,
              verified_new: issues.filter(i => i.labels.some(l => l.name === 'status:verified-new')).length,
              duplicates: issues.filter(i => i.labels.some(l => l.name === 'status:duplicate')).length,
              stale: issues.filter(i => i.labels.some(l => l.name === 'status:stale')).length,
              needs_triage: issues.filter(i => i.labels.some(l => l.name === 'status:needs-triage')).length,
            };
            
            // Get currently open issues count
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 1
            });
            
            stats.currently_open = openIssues.length > 0 ? 
              parseInt(context.payload.repository.open_issues_count || 0) : 0;
            
            // Calculate velocity
            stats.resolution_rate = stats.opened > 0 ? 
              ((stats.closed / stats.opened) * 100).toFixed(1) : '0.0';
            
            // Store for next step
            core.setOutput('stats', JSON.stringify(stats));
            
            return stats;

      - name: Create issue report
        uses: actions/github-script@v7
        with:
          script: |
            const stats = JSON.parse('${{ steps.stats.outputs.stats }}');
            const now = new Date().toISOString().split('T')[0];
            
            // Create markdown report
            const body = `## 📊 Weekly Issue Report (${now})
            
            ### Summary
            
            | Metric | Count | 
            |--------|-------|
            | 🆕 Issues Opened | ${stats.opened} |
            | ✅ Issues Closed | ${stats.closed} |
            | 📂 Currently Open | ${stats.currently_open} |
            | 📈 Resolution Rate | ${stats.resolution_rate}% |
            
            ### Request Breakdown
            
            | Request Type | Count |
            |--------------|-------|
            | ➕ Add Requests | ${stats.add_requests} |
            | ➖ Remove Requests | ${stats.remove_requests} |
            | ✨ Verified New | ${stats.verified_new} |
            | 🔄 Duplicates | ${stats.duplicates} |
            
            ### Triage Status
            
            | Status | Count |
            |--------|-------|
            | 🔍 Needs Triage | ${stats.needs_triage} |
            | 📅 Stale Issues | ${stats.stale} |
            
            ### Insights
            
            ${stats.resolution_rate >= 100 
              ? '🎉 **Excellent work!** We closed more issues than we opened this week!' 
              : stats.resolution_rate >= 80 
                ? '✅ **Great progress!** We\'re keeping up with the issue flow.' 
                : stats.resolution_rate >= 50 
                  ? '⚠️ **Moderate pace.** Consider increasing triage efforts.' 
                  : '🔴 **Backlog growing.** More triage needed to keep up with new issues.'}
            
            ${stats.needs_triage > 10 
              ? `⚠️ **Action needed:** ${stats.needs_triage} issues need triage.` 
              : '✅ **Triage is current.**'}
            
            ${stats.stale > 5 
              ? `📅 **Note:** ${stats.stale} stale issues may close soon if inactive.` 
              : ''}
            
            ---
            
            ### 🤖 Automation Stats
            
            - ✅ Daily scheduled triage is running
            - ✅ Stale issue cleanup is active
            - ✅ Auto-labeling is working
            
            ### 📝 Next Actions
            
            1. Review \`status:needs-triage\` issues
            2. Process verified add/remove requests
            3. Close or update stale issues
            4. Respond to community questions
            
            ---
            
            _This report was generated automatically by the Weekly Issue Report workflow._
            _For questions or suggestions, please open an issue._
            `;
            
            // Create the issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Issue Report - ${now}`,
              body: body,
              labels: ['report', 'automation']
            });
            
            console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            
            // Also add to job summary
            core.summary
              .addHeading('📊 Weekly Issue Report Created')
              .addLink(`Issue #${issue.number}`, issue.html_url)
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Issues Opened', `${stats.opened}`],
                ['Issues Closed', `${stats.closed}`],
                ['Currently Open', `${stats.currently_open}`],
                ['Resolution Rate', `${stats.resolution_rate}%`]
              ])
              .write();
