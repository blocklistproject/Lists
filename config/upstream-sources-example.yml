      filter_category: tracking

# =============================================================================
# CONFIGURATION OPTIONS EXPLAINED
# =============================================================================

# url: The full URL to the upstream blocklist
# format: The format of the upstream list
#   - hosts: 0.0.0.0 domain format
#   - domains: Plain domain list (one per line)
#   - adguard: ||domain^ format
#   - dnsmasq: server=/domain/ format
# trusted: Whether to allow auto-merge for small changes
#   - true: Can auto-merge if ≤10 domains
#   - false: Always requires manual review
# update_frequency: How often to check
#   - daily: Check every day
#   - weekly: Check once per week
#   - hourly: Check every hour (use sparingly!)
# filter_comments: (optional) Skip lines starting with #
#   - true: Remove comment lines
#   - false: Keep all lines
# max_domains: (optional) Limit number of domains to prevent huge merges
#   - Example: 1000 will limit to first 1000 domains
# filter_category: (optional) Only for lists that contain multiple categories
#   - Requires custom filtering logic in monitor script

# =============================================================================
# HOW TO ADD TO YOUR lists.yml
# =============================================================================

# 1. Open config/lists.yml
# 2. Find the list you want to add sources to (e.g., "ads:")
# 3. After the "status: stable" line, add the upstream_sources section
# 4. Copy the relevant section from this file
# 5. Ensure proper indentation (2 spaces per level)
# 6. Test with: python scripts/monitor_upstream.py --list <name> --dry-run

