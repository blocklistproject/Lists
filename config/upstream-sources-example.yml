# Example Upstream Source Configurations
# 
# Copy these upstream_sources sections into your config/lists.yml
# under the appropriate list definitions.
#
# IMPORTANT: Add these UNDER the existing list properties (description, category, status)

# Example structure:
# lists:
#   your_list:
#     description: "Description here"
#     category: security
#     status: stable
#     upstream_sources:  # <-- Add this section
#       - url: "..."
#         format: hosts
#         trusted: true
#         update_frequency: daily

# First, add this to settings section (at the top of lists.yml):
settings:
  # ... existing settings ...
  
  # Add this upstream monitoring configuration:
  upstream:
    enabled: true
    check_frequency: "daily"
    auto_merge_threshold: 10
    require_review_threshold: 100
    cache_ttl: 86400

# Then add upstream_sources to individual lists:

# =============================================================================
# SECURITY LISTS
# =============================================================================

abuse:
  # Add after status: stable
  upstream_sources:
    - url: "https://raw.githubusercontent.com/mitchellkrogza/The-Big-List-of-Hacked-Malware-Web-Sites/master/hacked-domains.list"
      format: domains
      trusted: true
      update_frequency: daily
    - url: "https://urlhaus.abuse.ch/downloads/hostfile/"
      format: hosts
      trusted: true
      update_frequency: daily
      filter_comments: true

